aid: fullenrich
url: https://raw.githubusercontent.com/api-evangelist/fullenrich/refs/heads/main/apis.yml
name: FullEnrich
kind: company
description: FullEnrich is a B2B contact enrichment platform that finds verified
  business emails and mobile phone numbers by running a waterfall across 15+ data
  vendors. Its API accepts contacts by name plus company (domain or company name)
  or LinkedIn URL, submits them for bulk enrichment, and returns the most probable
  work email, personal email, and mobile phone, billing credits only when data is
  found.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- B2B Data
- Contact Enrichment
- Email Finder
- Phone Finder
- Waterfall Enrichment
- Sales Intelligence
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
