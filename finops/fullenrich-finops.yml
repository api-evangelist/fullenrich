description: >-
  FinOps view of FullEnrich spend. FullEnrich bills in credits that are only
  consumed when verified data is found: one credit per verified work email,
  three credits per personal email, and ten credits per mobile phone number.
  Failed lookups, landlines, and out-of-service numbers cost nothing. Credits
  are purchased through monthly or annual subscription tiers and roll over
  (three months monthly, twelve months annual). Cost is driven by which
  enrich_fields are requested and by match rates.
notes: >-
  Credit-to-currency rates depend on the subscription tier and change over time;
  verify against the FullEnrich pricing page during reconciliation.
