meters:
- name: work_email_credits
  description: One credit consumed per verified work email found.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - enrichment
- name: personal_email_credits
  description: Three credits consumed per personal email found.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - enrichment
- name: phone_credits
  description: Ten credits consumed per mobile phone number found.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - enrichment
- name: contacts_submitted
  description: Contacts submitted for enrichment (up to 100 per request); not billed directly.
  unit: contacts
  aggregation: sum
  dimensions:
  - account
  - enrichment
- name: credit_balance
  description: Remaining workspace credit balance from GET /account/credits.
  unit: credits
  aggregation: last
  dimensions:
  - account
principles:
- name: Visibility
  description: >-
    Poll GET /account/credits to track balance and read cost.credits on each
    enrichment result to attribute spend per batch.
- name: Allocation
  description: >-
    Use the custom object on each contact and the readable enrichment name to
    tag records to teams, campaigns, or CRM records for chargeback.
- name: Optimization
  description: >-
    Request only the enrich_fields you need — skip phones (10 credits) or
    personal emails (3 credits) when a work email (1 credit) suffices. Because
    failed lookups are free, dedupe inputs and pass LinkedIn URLs to raise match
    rates without adding cost.
- name: Accountability
  description: >-
    Assign a credit budget per workspace/key, review monthly credit burn against
    the plan allotment, and account for the three/twelve-month rollover window.
